<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Artifex</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@300;400;700&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme contact-page">
    <div class="grain-overlay"></div>
    <canvas id="pattern-canvas"></canvas>

    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <a href="index.html" class="logo-text">ARTIFEX</a>
                <div class="nav-links">
                    <a href="index.html#work" class="nav-link">Work</a>
                    <a href="index.html#services" class="nav-link">Services</a>
                    <a href="index.html" class="nav-link">Home</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="contact-main">
        <div class="container">
            <h1 class="contact-title">Contact me</h1>
            
            <div class="contact-grid">
                <!-- Info Column -->
                <div class="contact-info">
                    <div class="info-block">
                        <p class="info-label">Email</p>
                        <a href="mailto:contact@artifex.com" class="info-value">contact@artifex.com</a>
                    </div>
                    <div class="info-block">
                        <p class="info-label">Phone</p>
                        <p class="info-value">(555) 000-0000</p>
                    </div>
                    <div class="info-block">
                        <p class="info-label">Studio</p>
                        <p class="info-value">123 Design Street<br>New York, NY 10001</p>
                    </div>
                </div>

                <!-- Form Column -->
                <div class="contact-form-container">
                    <form class="contact-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Name (required)</label>
                                <div class="name-inputs">
                                    <input type="text" placeholder="First Name" required>
                                    <input type="text" placeholder="Last Name" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Email (required)</label>
                            <input type="email" placeholder="Your Email" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Message (required)</label>
                            <textarea rows="5" placeholder="Tell us about your project" required></textarea>
                        </div>

                        <button type="submit" class="btn-primary contact-submit">SUBMIT</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 ARTIFEX. All rights reserved.</p>
        </div>
    </footer>

    <script src="patterns.js"></script>
    <script>
        // Simple form handling
        document.querySelector('.contact-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Message received. We will get back to you shortly.');
        });
    </script>
</body>
</html>
