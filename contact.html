<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Artifex</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@300;400;700&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body class="dark-theme contact-page">
    <div class="grain-overlay"></div>
    <canvas id="pattern-canvas"></canvas>

    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <a href="index.html" class="logo-text">ARTIFEX</a>
                <div class="nav-links">
                    <a href="index.html#work" class="nav-link">Work</a>
                    <a href="index.html#services" class="nav-link">Services</a>
                    <a href="index.html" class="nav-link">Home</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="contact-main">
        <div class="container">
            <h1 class="contact-title">Contact me</h1>
            
            <div class="contact-grid">
                <!-- Info Column -->
                <div class="contact-info">
                    <div class="info-block">
                        <p class="info-label">Email</p>
                        <a href="mailto:contact@artifex.com" class="info-value">contact@artifex.com</a>
                    </div>
                    <div class="info-block">
                        <p class="info-label">Phone</p>
                        <p class="info-value">(555) 000-0000</p>
                    </div>
                    <div class="info-block">
                        <p class="info-label">Studio</p>
                        <p class="info-value">123 Design Street<br>New York, NY 10001</p>
                    </div>
                </div>

                <!-- Form Column -->
                <div class="contact-form-container">
                    <form class="contact-form" id="contact-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Name (required)</label>
                                <div class="name-inputs">
                                    <input type="text" name="firstName" placeholder="First Name" required>
                                    <input type="text" name="lastName" placeholder="Last Name" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Email (required)</label>
                            <input type="email" name="email" placeholder="Your Email" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Message (required)</label>
                            <textarea name="message" rows="5" placeholder="Tell us about your project" required></textarea>
                        </div>

                        <button type="submit" class="btn-primary contact-submit">SUBMIT</button>
                        <div id="form-status" class="form-status-msg"></div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 ARTIFEX. All rights reserved.</p>
        </div>
    </footer>

    <script src="patterns.js"></script>
    <script>
        const form = document.getElementById('contact-form');
        const statusMsg = document.getElementById('form-status');
        const submitBtn = form.querySelector('button');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI State: Loading
            submitBtn.innerText = 'SENDING...';
            submitBtn.disabled = true;
            statusMsg.innerText = '';

            const formData = {
                firstName: form.firstName.value,
                lastName: form.lastName.value,
                email: form.email.value,
                message: form.message.value
            };

            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    statusMsg.innerText = 'Success! Your message has been sent.';
                    statusMsg.style.color = '#00ff88';
                    form.reset();
                } else {
                    const err = await response.json();
                    throw new Error(err.error || 'Failed to send message.');
                }
            } catch (err) {
                statusMsg.innerText = `Error: ${err.message}`;
                statusMsg.style.color = '#ff4444';
            } finally {
                submitBtn.innerText = 'SUBMIT';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
